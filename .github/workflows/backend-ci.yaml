name: Backend CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v7.6.0

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run ruff linting
        run: uv run ruff check --output-format=github

      - name: Check ruff formatting
        run: uv run ruff format --diff --output-format=github --preview # needed due to the gh format not in stable
        continue-on-error: true
        # oops it also introduced formatting into markdown :D

      - name: Ty check
        run: uv run ty check --output-format=github
        continue-on-error: true

  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7.6.0

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run tests
        run: CI=1 uv run pytest --junitxml=junit/test-results.xml --cov src.marketplace_andes_backend --cov-report=xml --cov-report=html
