[project]
name = "marketplace-andes-backend"
version = "0.0.1"
description = "Marketplace Andes Backend"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "fastapi[standard]>=0.133.1",
    "pyjwt>=2.11.0",
    "psycopg[binary]>=3.3.3",
    "sqlmodel>=0.0.37",
    "passlib[argon2]>=1.7.4",
]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "ruff>=0.15.2",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
