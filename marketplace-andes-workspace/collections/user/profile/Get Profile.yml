docs: |
  # User Profile

  Returns a user profile by ID.

  ## Endpoint

  - Method: `GET`
  - URL: `/users/profile/{user_id}`

  ## Path Params

  - `user_id` (integer): ID of the user to fetch.

  ## Success Response

  - Status: `200 OK`
  - Body:

    ```json
    {
      "id": 1,
      "name": "Alice",
      "email": "alice@example.com",
      "rating": 5
    }
    ```

  ### Field Notes

  - `id`: integer
  - `name`: string
  - `email`: string
  - `rating`: integer from 0 to 5

  ## Error Response

  - Status: `404 Not Found`
  - Body:

    ```json
    {
      "detail": "User not found"
    }
    ```
