info:
  name: register
  type: http
  seq: 1

http:
  method: POST
  url: "{{server}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "test@example.com",
        "username": "testuser",
        "full_name": "Test User",
        "password": "securepassword123"
