services:
  server:
    build:
      context: server
    env_file:
      - .env.server
    restart: unless-stopped
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./server/src
        - action: rebuild
          path: ./server/pyproject.toml

  migration:
    build:
      context: migrations
    env_file:
      - .env.migrations
    profiles:
      - dev
    restart: no
    depends_on:
      postgres:
        condition: service_healthy

  load_fake:
    build:
      context: load_fake
    env_file:
      - .env.load_fake
    profiles:
      - load_fake
    restart: no
    depends_on:
      migration:
        condition: service_completed_successfully

  postgres:
    image: postgres:18.3-trixie
    restart: unless-stopped
    user: postgres
    env_file:
      - .env.pg
    volumes:
      - ./config/pg:/docker-entrypoint-initdb.d:ro,Z
      - postgres-data:/var/lib/postgresql
    ports:
      - 5432:5432
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9.13
    restart: unless-stopped
    env_file:
      - .env.pgadmin
    profiles:
      - pgadmin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./config/pgadmin/servers.compose.json:/pgadmin4/servers.json:ro,Z
    ports:
      - 5050:80
    depends_on:
      postgres:
        condition: service_healthy

  otel_collector:
    image: grafana/alloy:v1.14.1
    restart: unless-stopped
    profiles:
      - otel

volumes:
  postgres-data:
  pgadmin-data:
